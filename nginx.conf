server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # Assets hashés (immuables) : cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Autres médias statiques.
    location ~* \.(?:js|css|png|jpe?g|gif|svg|webp|avif|ico|woff2?|glb|gltf|hdr|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Pages : chaque /demos/<slug>/ résout son propre index.html.
    # Chemin inconnu -> retour à la galerie.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
